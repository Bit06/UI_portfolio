<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OD — Digital Designer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      @keyframes subtle-gradient {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      @keyframes fade-in-up {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in-up {
        animation: fade-in-up 0.8s ease-out forwards;
        opacity: 0;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #0A0A0A;
        color: #EAEAEA;
        background: radial-gradient(circle at top left, rgba(51, 102, 255, 0.1), transparent 40%),
                    radial-gradient(circle at bottom right, rgba(51, 102, 255, 0.1), transparent 40%),
                    #0A0A0A;
        background-size: 300% 300%;
        animation: subtle-gradient 20s ease infinite;
      }
      ::selection {
        background-color: #3366FF;
        color: #EAEAEA;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #404040; /* zinc-700 */
        border-radius: 2px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #525252; /* zinc-600 */
      }
    </style>
  <script type="importmap">

    "react/": "https://aistudiocdn.com/react@^19.2.0/",

  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

</html>
