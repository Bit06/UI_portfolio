<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #fcfcfc; }
      .line { stroke: #d1d5db; stroke-width: 2; stroke-dasharray: 4 4; }
      .circle-main { fill: #ffffff; stroke: #111827; stroke-width: 3; }
      .circle-node { fill: #f9fafb; stroke: #4b5563; stroke-width: 2; }
      .text-main { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 18px; font-weight: 700; fill: #111827; text-anchor: middle; }
      .text-node { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; font-weight: 600; fill: #374151; text-anchor: middle; }
      .text-sub { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 12px; fill: #6b7280; text-anchor: middle; }
    </style>
  </defs>
  <rect width="100%" height="100%" class="bg"/>
  
  <!-- Lines connecting to center (400, 250) -->
  <!-- Top: Executive -->
  <line x1="400" y1="250" x2="400" y2="90" class="line"/>
  <!-- Top Right: Landlord -->
  <line x1="400" y1="250" x2="552" y2="140" class="line"/>
  <!-- Bottom Right: Tenant -->
  <line x1="400" y1="250" x2="494" y2="380" class="line"/>
  <!-- Bottom Left: Resident -->
  <line x1="400" y1="250" x2="306" y2="380" class="line"/>
  <!-- Top Left: Facility Manager -->
  <line x1="400" y1="250" x2="248" y2="140" class="line"/>

  <!-- Center Circle -->
  <circle cx="400" cy="250" r="70" class="circle-main"/>
  <text x="400" y="245" class="text-main">MyEstate</text>
  <text x="400" y="265" class="text-sub">Core Platform</text>

  <!-- Nodes -->
  <!-- Executive -->
  <circle cx="400" cy="90" r="50" class="circle-node"/>
  <text x="400" y="85" class="text-node">Executive</text>
  <text x="400" y="105" class="text-sub">Portfolio &amp; KPIs</text>

  <!-- Landlord -->
  <circle cx="552" cy="140" r="50" class="circle-node"/>
  <text x="552" y="135" class="text-node">Landlord</text>
  <text x="552" y="155" class="text-sub">Rent &amp; Leases</text>

  <!-- Facility Manager -->
  <circle cx="248" cy="140" r="50" class="circle-node"/>
  <text x="248" y="130" class="text-node">Facility</text>
  <text x="248" y="148" class="text-node">Manager</text>
  <text x="248" y="168" class="text-sub">Maintenance</text>

  <!-- Resident -->
  <circle cx="306" cy="380" r="50" class="circle-node"/>
  <text x="306" y="375" class="text-node">Resident</text>
  <text x="306" y="395" class="text-sub">Service Charges</text>

  <!-- Tenant -->
  <circle cx="494" cy="380" r="50" class="circle-node"/>
  <text x="494" y="375" class="text-node">Tenant</text>
  <text x="494" y="395" class="text-sub">Rent Payments</text>
</svg>
