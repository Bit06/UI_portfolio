<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: transparent; }
      .header-bg { fill: rgba(255, 255, 255, 0.05); }
      .row-even { fill: transparent; }
      .row-odd { fill: rgba(255, 255, 255, 0.02); }
      .border { stroke: rgba(255, 255, 255, 0.1); stroke-width: 1; }
      
      .text-header { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; font-weight: 600; fill: #ffffff; }
      .text-cell { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; fill: #d1d5db; }
      .text-bold { font-weight: 600; fill: #ffffff; }
      
      .check { fill: none; stroke: #34d399; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .cross { fill: none; stroke: #f87171; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 24px; font-weight: 700; fill: #ffffff; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; fill: #9ca3af; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg"/>

  <!-- Outer Dotted Outline covering entire section -->
  <rect x="2" y="2" width="996" height="536" rx="12" fill="none" stroke="rgba(255, 255, 255, 0.4)" stroke-width="2" stroke-dasharray="6 4" />

  <g transform="translate(30, 40)">
    <text x="0" y="0" class="title">Role-Based Access Control (RBAC) Matrix</text>
    <text x="0" y="25" class="subtitle">Defining permissions across 5 distinct user environments to prevent data overlap.</text>
  </g>

  <!-- Table Container -->
  <g transform="translate(20, 100)">
    
    <!-- Header -->
    <rect x="0" y="0" width="960" height="50" rx="6" class="header-bg"/>
    <text x="20" y="30" class="text-header">Permissions &amp; Features</text>
    <text x="400" y="30" class="text-header" text-anchor="middle">Executive</text>
    <text x="520" y="30" class="text-header" text-anchor="middle">Landlord</text>
    <text x="640" y="30" class="text-header" text-anchor="middle">Facility Mgr</text>
    <text x="760" y="30" class="text-header" text-anchor="middle">Tenant</text>
    <text x="880" y="30" class="text-header" text-anchor="middle">Resident</text>

    <!-- Rows -->
    <g transform="translate(0, 50)">
      <!-- Row 1 -->
      <rect x="0" y="0" width="960" height="60" class="row-even"/>
      <line x1="0" y1="60" x2="960" y2="60" class="border"/>
      <text x="20" y="35" class="text-cell text-bold">View Portfolio Analytics</text>
      <!-- Exec --> <path d="M 392 31 L 397 38 L 408 27" class="check"/>
      <!-- Land --> <path d="M 514 29 L 526 41 M 526 29 L 514 41" class="cross"/>
      <!-- FM   --> <path d="M 634 29 L 646 41 M 646 29 L 634 41" class="cross"/>
      <!-- Ten  --> <path d="M 754 29 L 766 41 M 766 29 L 754 41" class="cross"/>
      <!-- Res  --> <path d="M 874 29 L 886 41 M 886 29 L 874 41" class="cross"/>

      <!-- Row 2 -->
      <rect x="0" y="60" width="960" height="60" class="row-odd"/>
      <line x1="0" y1="120" x2="960" y2="120" class="border"/>
      <text x="20" y="95" class="text-cell text-bold">Manage Users (Role Generation)</text>
      <!-- Exec --> <text x="400" y="95" class="text-cell" text-anchor="middle">All Roles</text>
      <!-- Land --> <text x="520" y="95" class="text-cell" text-anchor="middle">Tenants</text>
      <!-- FM   --> <text x="640" y="95" class="text-cell" text-anchor="middle">Residents</text>
      <!-- Ten  --> <path d="M 754 89 L 766 101 M 766 89 L 754 101" class="cross"/>
      <!-- Res  --> <path d="M 874 89 L 886 101 M 886 89 L 874 101" class="cross"/>

      <!-- Row 3 -->
      <rect x="0" y="120" width="960" height="60" class="row-even"/>
      <line x1="0" y1="180" x2="960" y2="180" class="border"/>
      <text x="20" y="155" class="text-cell text-bold">View Rent &amp; Lease Data</text>
      <!-- Exec --> <path d="M 392 151 L 397 158 L 408 147" class="check"/>
      <!-- Land --> <path d="M 512 151 L 517 158 L 528 147" class="check"/>
      <!-- FM   --> <path d="M 634 149 L 646 161 M 646 149 L 634 161" class="cross"/>
      <!-- Ten  --> <path d="M 752 151 L 757 158 L 768 147" class="check"/>
      <!-- Res  --> <path d="M 874 149 L 886 161 M 886 149 L 874 161" class="cross"/>

      <!-- Row 4 -->
      <rect x="0" y="180" width="960" height="60" class="row-odd"/>
      <line x1="0" y1="240" x2="960" y2="240" class="border"/>
      <text x="20" y="215" class="text-cell text-bold">Pay Rent</text>
      <!-- Exec --> <path d="M 394 209 L 406 221 M 406 209 L 394 221" class="cross"/>
      <!-- Land --> <path d="M 514 209 L 526 221 M 526 209 L 514 221" class="cross"/>
      <!-- FM   --> <path d="M 634 209 L 646 221 M 646 209 L 634 221" class="cross"/>
      <!-- Ten  --> <path d="M 752 211 L 757 218 L 768 207" class="check"/>
      <!-- Res  --> <path d="M 874 209 L 886 221 M 886 209 L 874 221" class="cross"/>

      <!-- Row 5 -->
      <rect x="0" y="240" width="960" height="60" class="row-even"/>
      <line x1="0" y1="300" x2="960" y2="300" class="border"/>
      <text x="20" y="275" class="text-cell text-bold">View Service Charges (Utilities)</text>
      <!-- Exec --> <path d="M 392 271 L 397 278 L 408 267" class="check"/>
      <!-- Land --> <path d="M 514 269 L 526 281 M 526 269 L 514 281" class="cross"/>
      <!-- FM   --> <path d="M 632 271 L 637 278 L 648 267" class="check"/>
      <!-- Ten  --> <path d="M 754 269 L 766 281 M 766 269 L 754 281" class="cross"/>
      <!-- Res  --> <path d="M 872 271 L 877 278 L 888 267" class="check"/>

      <!-- Row 6 -->
      <rect x="0" y="300" width="960" height="60" class="row-odd"/>
      <text x="20" y="335" class="text-cell text-bold">Maintenance Requests</text>
      <!-- Exec --> <path d="M 394 329 L 406 341 M 406 329 L 394 341" class="cross"/>
      <!-- Land --> <path d="M 514 329 L 526 341 M 526 329 L 514 341" class="cross"/>
      <!-- FM   --> <text x="640" y="335" class="text-cell" text-anchor="middle">Manage Tickets</text>
      <!-- Ten  --> <path d="M 754 329 L 766 341 M 766 329 L 754 341" class="cross"/>
      <!-- Res  --> <text x="880" y="335" class="text-cell" text-anchor="middle">Submit &amp; Chat</text>
    </g>
  </g>
</svg>
